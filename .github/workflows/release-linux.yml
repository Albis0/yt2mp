name: Build Linux AppImage

# Fires when a version tag is pushed. Builds the Linux AppImage on an Ubuntu
# runner (electron-builder can't produce Linux targets reliably from Windows)
# and attaches it to the GitHub Release for that tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-appimage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop-app

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Linux yt-dlp + a static ffmpeg, fetched at build time so they never
      # live in the repo. yt-dlp ships a self-contained Linux binary; ffmpeg
      # comes from John Van Sickle's widely-used static builds.
      - name: Fetch Linux binaries
        run: |
          mkdir -p resources/linux
          curl -L -o resources/linux/yt-dlp \
            https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
          curl -L -o /tmp/ffmpeg.tar.xz \
            https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf /tmp/ffmpeg.tar.xz -C /tmp
          cp /tmp/ffmpeg-*-amd64-static/ffmpeg resources/linux/ffmpeg
          chmod +x resources/linux/yt-dlp resources/linux/ffmpeg

      # GROQ_KEYS powers AI search. Pulled from a repo secret into the .env that
      # after-pack.js bundles. If the secret is unset, AI search falls back to
      # the raw query — the build still succeeds.
      - name: Write .env
        run: |
          echo "GROQ_KEYS=${{ secrets.GROQ_KEYS }}" > .env

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build AppImage
        run: bun run electron:build

      - name: Compute checksum
        id: hash
        run: |
          APPIMAGE=$(ls release/*.AppImage | head -n1)
          echo "file=$APPIMAGE" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$APPIMAGE" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-app/${{ steps.hash.outputs.file }}
          append_body: true
          body: |

            ---
            **Linux AppImage** · sha256 `${{ steps.hash.outputs.sha256 }}`
